<!DOCTYPE html><html dir="rtl" lang="ar" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&amp;family=Noto+Sans+Arabic:wght@400;700;800&amp;display=swap" rel="stylesheet">

        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e1e3e4",
                    "on-primary": "#ffffff",
                    "tertiary": "#5e5e5e",
                    "primary-fixed-dim": "#ffb1c4",
                    "surface-container-highest": "#e1e3e4",
                    "on-secondary": "#ffffff",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed": "#001257",
                    "on-primary-fixed-variant": "#8f0043",
                    "surface-dim": "#d9dadb",
                    "surface-container-high": "#e7e8e9",
                    "inverse-on-surface": "#f0f1f2",
                    "on-error-container": "#93000a",
                    "background": "#f8f9fa",
                    "on-tertiary": "#ffffff",
                    "outline": "#8d7076",
                    "primary": "#b90a5a",
                    "surface-bright": "#f8f9fa",
                    "outline-variant": "#e1bec5",

                    "on-tertiary-container": "#2a2a2a",
                    "tertiary-fixed-dim": "#c6c6c6",
                    "on-background": "#191c1d",
                    "on-primary-fixed": "#3f001a",
                    "on-tertiary-fixed-variant": "#474747",
                    "tertiary-container": "#919191",
                    "on-secondary-container": "#364486",
                    "inverse-surface": "#2e3132",
                    "primary-fixed": "#ffd9e0",
                    "on-secondary-fixed-variant": "#334283",
                    "on-tertiary-fixed": "#1b1b1b",
                    "surface-container-low": "#f3f4f5",
                    "tertiary-fixed": "#e2e2e2",
                    "on-error": "#ffffff",
                    "inverse-primary": "#ffb1c4",

            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"

            "spacing": {

                    "base": "8px",
                    "gutter": "16px",
                    "container-margin": "24px",
                    "section-gap": "32px"
            },
            "fontFamily": {
                    "headline-md": ["Noto Sans Arabic", "Plus Jakarta Sans"],
                    "price-display": ["Noto Sans Arabic", "Plus Jakarta Sans"],

            "fontSize": {

                    "price-display": ["20px", {"lineHeight": "24px", "fontWeight": "800"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-bold": ["14px", {"lineHeight": "16px", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          },
        },
      }

</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-gutter">
<!-- Background Decorative Element -->
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="absolute -top-[10%] -right-[10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[40%] h-[40%] bg-secondary/10 rounded-full blur-[100px]"></div>
</div>
<!-- Main Auth Container -->
<main class="w-full max-w-[480px] flex flex-col gap-section-gap relative" style="transform: perspective(1000px) rotateY(1.76923deg) rotateX(-2.45066deg);">
<!-- Brand Identity -->
<div class="flex flex-col items-center text-center gap-2">
<h1 class="text-headline-xl font-headline-xl text-on-surface tracking-tighter">Sole &amp; Style</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">مرحباً بك في عالم الأناقة والخطوات الواثقة</p>
</div>
<!-- Auth Card -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-[2rem] shadow-2xl transition-all duration-500 overflow-hidden border border-surface-variant/30" id="auth-card">
<!-- Toggle Navigation (Sign In / Sign Up) -->
<div class="flex bg-surface-container rounded-full p-1 mb-8">
<button class="flex-1 py-3 text-label-bold font-label-bold rounded-full transition-all duration-300 bg-surface-container-lowest text-on-surface shadow-sm" id="toggle-signin" onclick="switchMode('signin')">
                    تسجيل الدخول
                </button>
<button class="flex-1 py-3 text-label-bold font-label-bold rounded-full transition-all duration-300 text-on-surface-variant hover:text-on-surface" id="toggle-signup" onclick="switchMode('signup')">
                    إنشاء حساب
                </button>
</div>
<!-- Sign In Form -->
<form class="flex flex-col gap-6" id="signin-form">
<div class="flex flex-col gap-2">
<label class="text-label-bold font-label-bold px-1" for="email">البريد الإلكتروني</label>
<input class="w-full px-6 py-4 rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary transition-all text-body-lg font-body-lg" id="email" placeholder="example@style.com" type="email">
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="text-label-bold font-label-bold" for="password">كلمة المرور</label>
<a class="text-body-sm font-body-sm text-primary hover:underline" href="#">نسيت كلمة المرور؟</a>
</div>
<div class="relative">
<input class="w-full px-6 py-4 rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary transition-all text-body-lg font-body-lg" id="password" placeholder="••••••••" type="password">
<button class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="w-full py-4 bg-on-surface text-on-primary text-label-bold font-label-bold rounded-xl transition-all hover:bg-primary active:scale-95 shadow-lg shadow-on-surface/10 uppercase tracking-wider mt-2" type="submit">
                    تسجيل الدخول
                </button>
</form>
<!-- Sign Up Form (Hidden by default) -->
<form class="hidden flex flex-col gap-6" id="signup-form">
<div class="flex flex-col gap-2">
<label class="text-label-bold font-label-bold px-1" for="name-signup">الاسم الكامل</label>
<input class="w-full px-6 py-4 rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary transition-all text-body-lg font-body-lg" id="name-signup" placeholder="أدخل اسمك هنا" type="text">
</div>
<div class="flex flex-col gap-2">
<label class="text-label-bold font-label-bold px-1" for="email-signup">البريد الإلكتروني</label>
<input class="w-full px-6 py-4 rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary transition-all text-body-lg font-body-lg" id="email-signup" placeholder="example@style.com" type="email">
</div>
<div class="flex flex-col gap-2">
<label class="text-label-bold font-label-bold px-1" for="password-signup">كلمة المرور</label>
<input class="w-full px-6 py-4 rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary transition-all text-body-lg font-body-lg" id="password-signup" placeholder="••••••••" type="password">
</div>
<div class="flex items-start gap-3 px-1">
<input class="mt-1 rounded border-surface-variant text-primary focus:ring-primary" id="terms" type="checkbox">
<label class="text-body-sm font-body-sm text-on-surface-variant leading-tight" for="terms">أوافق على <a class="text-primary hover:underline" href="#">الشروط والأحكام</a> و <a class="text-primary hover:underline" href="#">سياسة الخصوصية</a></label>
</div>
<button class="w-full py-4 bg-primary-container text-on-primary-container text-label-bold font-label-bold rounded-xl transition-all hover:opacity-90 active:scale-95 shadow-lg shadow-primary/20 uppercase tracking-wider mt-2" type="submit">
                    إنشاء حساب جديد
                </button>
</form>
<!-- Social Logins -->
<div class="mt-10">
<div class="relative flex items-center justify-center mb-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-variant/40"></div>
</div>
<span class="relative px-4 bg-surface-container-lowest text-body-sm font-body-sm text-on-surface-variant">أو تابع باستخدام</span>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 border border-surface-variant/50 rounded-xl hover:bg-surface-container-low transition-all active:scale-95">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-label-bold font-label-bold">جوجل</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 border border-surface-variant/50 rounded-xl hover:bg-surface-container-low transition-all active:scale-95">
<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
<path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"></path>
</svg>
<span class="text-label-bold font-label-bold">فيسبوك</span>
</button>
</div>
</div>
</div>
<!-- Footer Visual -->

</main>
<script>
        function switchMode(mode) {
            const signinForm = document.getElementById('signin-form');
            const signupForm = document.getElementById('signup-form');
            const toggleSignin = document.getElementById('toggle-signin');
            const toggleSignup = document.getElementById('toggle-signup');
            const authCard = document.getElementById('auth-card');

            if (mode === 'signup') {
                signinForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                
                toggleSignup.classList.add('bg-surface-container-lowest', 'text-on-surface', 'shadow-sm');
                toggleSignup.classList.remove('text-on-surface-variant');
                
                toggleSignin.classList.remove('bg-surface-container-lowest', 'text-on-surface', 'shadow-sm');
                toggleSignin.classList.add('text-on-surface-variant');
                
                authCard.style.transform = 'translateY(-10px)';
                setTimeout(() => authCard.style.transform = 'translateY(0)', 300);
            } else {
                signupForm.classList.add('hidden');
                signinForm.classList.remove('hidden');
                
                toggleSignin.classList.add('bg-surface-container-lowest', 'text-on-surface', 'shadow-sm');
                toggleSignin.classList.remove('text-on-surface-variant');
                
                toggleSignup.classList.remove('bg-surface-container-lowest', 'text-on-surface', 'shadow-sm');
                toggleSignup.classList.add('text-on-surface-variant');

                authCard.style.transform = 'translateY(-10px)';
                setTimeout(() => authCard.style.transform = 'translateY(0)', 300);
            }
        }

        // Add some floating animation for micro-interaction
        document.addEventListener('mousemove', (e) => {
            const amount = 5;
            const x = (e.clientX / window.innerWidth - 0.5) * amount;
            const y = (e.clientY / window.innerHeight - 0.5) * amount;
            document.querySelector('main').style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    </script>
</body></html>
