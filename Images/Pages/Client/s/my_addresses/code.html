<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary": "#5e5e5e",
                    "on-background": "#191c1d",
                    "inverse-primary": "#ffb1c4",
                    "primary-container": "#ff4d8d",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "on-secondary-container": "#364486",
                    "on-primary-container": "#5b0028",
                    "surface-container-low": "#f3f4f5",
                    "outline-variant": "#e1bec5",
                    "on-secondary-fixed": "#001257",
                    "on-primary-fixed-variant": "#8f0043",
                    "on-error-container": "#93000a",
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "secondary": "#4c5a9d",
                    "on-secondary-fixed-variant": "#334283",
                    "on-primary-fixed": "#3f001a",
                    "surface-container-highest": "#e1e3e4",
                    "surface-container-high": "#e7e8e9",
                    "inverse-surface": "#2e3132",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed-variant": "#474747",
                    "outline": "#8d7076",
                    "on-tertiary-container": "#2a2a2a",
                    "secondary-fixed": "#dde1ff",
                    "tertiary-fixed-dim": "#c6c6c6",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed-dim": "#b9c3ff",
                    "surface": "#f8f9fa",
                    "surface-dim": "#d9dadb",
                    "background": "#f8f9fa",
                    "surface-variant": "#e1e3e4",
                    "primary-fixed-dim": "#ffb1c4",
                    "tertiary-container": "#919191",
                    "surface-bright": "#f8f9fa",
                    "primary": "#b90a5a",
                    "surface-container": "#edeeef",
                    "on-surface": "#191c1d",
                    "primary-fixed": "#ffd9e0",
                    "secondary-container": "#a7b5ff",
                    "on-tertiary-fixed": "#1b1b1b",
                    "on-surface-variant": "#594046",
                    "tertiary-fixed": "#e2e2e2",
                    "surface-tint": "#b90a5a",
                    "inverse-on-surface": "#f0f1f2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "card-padding": "16px",
                    "section-gap": "32px",
                    "gutter": "16px",
                    "base": "8px",
                    "container-margin": "24px"
            },
            "fontFamily": {
                    "headline-md": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "body-sm": ["Plus Jakarta Sans"],
                    "headline-xl": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "price-display": ["Plus Jakarta Sans"],
                    "label-bold": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "headline-md": ["18px", {"lineHeight": "24px", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "price-display": ["20px", {"lineHeight": "24px", "fontWeight": "800"}],
                    "label-bold": ["14px", {"lineHeight": "16px", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #ff4d8d;
        }
        .toggle-checkbox:checked + .toggle-label .toggle-dot {
            transform: translateX(-100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-background flex items-center justify-between px-6 h-16 w-full">
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-100">
<span class="material-symbols-outlined transform scale-x-[-1]">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">العناوين</h1>
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-100">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
</header>
<main class="px-container-margin mt-base">
<!-- Progress/Mood Decoration -->
<div class="mb-section-gap overflow-hidden rounded-lg relative h-32 flex items-center justify-center">

<div class="relative z-10 text-center">
<h2 class="font-headline-md text-headline-md text-primary-container">إضافة عنوان جديد</h2>
<p class="font-body-sm text-body-sm text-tertiary">أدخل تفاصيل الشحن الخاصة بك</p>
</div>
</div>
<!-- Address Form -->
<form class="space-y-6" id="addressForm">
<!-- Country Selection -->
<div class="space-y-3">
<label class="font-label-bold text-label-bold text-on-surface-variant block">الدولة</label>
<div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
<button class="px-4 py-2 bg-on-background text-on-primary rounded-lg font-label-bold whitespace-nowrap" type="button">السعودية</button>
<button class="px-4 py-2 bg-surface-container-high text-on-surface-variant rounded-lg font-label-bold whitespace-nowrap" type="button">الإمارات</button>
<button class="px-4 py-2 bg-surface-container-high text-on-surface-variant rounded-lg font-label-bold whitespace-nowrap" type="button">الكويت</button>
<button class="px-4 py-2 bg-surface-container-high text-on-surface-variant rounded-lg font-label-bold whitespace-nowrap" type="button">قطر</button>
</div>
</div>
<!-- City -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant block" for="city">المدينة</label>
<div class="relative">
<select class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant focus:ring-2 focus:ring-primary-container rounded-lg px-4 py-3 appearance-none font-body-lg text-body-lg" id="city">
<option>الرياض</option>
<option>جدة</option>
<option>الدمام</option>
<option>الخبر</option>
</select>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none text-tertiary">expand_more</span>
</div>
</div>
<!-- Address Line 1 -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant block" for="address1">العنوان الأول</label>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant focus:ring-2 focus:ring-primary-container rounded-lg px-4 py-3 font-body-lg text-body-lg placeholder:text-tertiary-fixed-dim" id="address1" placeholder="اسم الشارع، رقم المبنى" type="text"/>
</div>
<!-- Address Line 2 -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant block" for="address2">العنوان الثاني (اختياري)</label>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant focus:ring-2 focus:ring-primary-container rounded-lg px-4 py-3 font-body-lg text-body-lg placeholder:text-tertiary-fixed-dim" id="address2" placeholder="رقم الشقة، الدور" type="text"/>
</div>
<!-- Default Toggle -->
<div class="flex items-center justify-between bg-surface-container-low p-4 rounded-lg">
<div class="space-y-1">
<span class="font-label-bold text-label-bold block">تعيين كعنوان افتراضي</span>
<span class="text-[12px] text-tertiary">سيتم استخدامه تلقائياً عند الدفع</span>
</div>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 left-0" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-container-highest cursor-pointer" for="toggle"></label>
</div>
</div>
<!-- Save Button -->
<button class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-headline-md text-headline-md hover:opacity-90 active:scale-95 transition-all shadow-lg" type="submit">حفظ العنوان</button>
</form>
<!-- Current Addresses Preview -->
<div class="mt-section-gap">
<h3 class="font-headline-md text-headline-md mb-4">عناوينك المسجلة</h3>
<div class="space-y-4">
<div class="bg-surface-container-lowest p-4 rounded-lg border border-outline-variant shadow-sm flex items-start gap-4">
<div class="bg-primary-fixed w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-primary">home</span>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start">
<span class="font-label-bold text-label-bold">المنزل</span>
<span class="bg-primary-container text-white text-[10px] px-2 py-0.5 rounded-full font-bold">افتراضي</span>
</div>
<p class="text-body-sm text-tertiary mt-1">شارع العليا، حي النرجس، الرياض</p>
</div>
<button class="text-tertiary">
<span class="material-symbols-outlined">edit</span>
</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl shadow-xl bg-surface-container-lowest flex justify-around items-center h-20 px-4 pb-safe">
<a class="flex flex-col items-center justify-center text-tertiary opacity-60 hover:text-primary-container transition-colors active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined">storefront</span>
<span class="font-label-bold text-label-bold">Shop</span>
</a>
<a class="flex flex-col items-center justify-center text-tertiary opacity-60 hover:text-primary-container transition-colors active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined">search</span>
<span class="font-label-bold text-label-bold">Search</span>
</a>
<a class="flex flex-col items-center justify-center text-tertiary opacity-60 hover:text-primary-container transition-colors active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined">shopping_bag</span>
<span class="font-label-bold text-label-bold">Bag</span>
</a>
<a class="flex flex-col items-center justify-center text-primary font-bold relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-primary after:rounded-full active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-bold text-label-bold">Profile</span>
</a>
</nav>
<script>
        document.getElementById('addressForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Subtle haptic-like feedback or animation would go here
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
            setTimeout(() => {
                btn.innerHTML = 'تم الحفظ بنجاح!';
                btn.classList.replace('bg-primary-container', 'bg-green-500');
                setTimeout(() => {
                    btn.innerHTML = 'حفظ العنوان';
                    btn.classList.replace('bg-green-500', 'bg-primary-container');
                }, 2000);
            }, 800);
        });

        // Add smooth interaction for inputs
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.previousElementSibling.style.color = '#ff4d8d';
            });
            input.addEventListener('blur', () => {
                input.parentElement.previousElementSibling.style.color = '';
            });
        });
    </script>
</body></html>
