<style>
        body { font-family: 'Noto Sans Arabic', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-gradient-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 80%, rgba(0,0,0,0.4) 100%);
        }
        .floating-sheet {
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 77, 141, 0.4);
            transform: scale(0);
            animation: ripple 2s infinite;
        }
        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background overflow-hidden h-screen w-full flex flex-col">
<!-- Header / Top App Bar -->
<header class="w-full top-0 sticky z-50 bg-background/80 backdrop-blur-md flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-on-surface">arrow_forward</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">إضافة عنوان جديد</h1>
</div>
<button class="p-2 rounded-full hover:bg-surface-container transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
</header>
<!-- Map Canvas -->
<main class="relative flex-grow w-full overflow-hidden">
<!-- Main Map Container -->
<div class="absolute inset-0 w-full h-full bg-surface-container-high">
<img class="w-full h-full object-cover grayscale-[20%] opacity-80" data-alt="A clean, minimalist topographical map view of a modern urban city district in Riyadh. The map features subtle pastel colors, wide boulevards, and clear building footprints. The lighting is bright and airy, reflecting a high-end light-mode UI aesthetic. The overall mood is precise, professional, and sophisticated, with a soft focus on surrounding areas to emphasize the central location." data-location="Riyadh" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBc6Y54Z8yt8xJuZKDOqTKc9Ov7ozKElA0_1QNsJWVn9jW3F_PNo78vI9Imbq_e32TiXuczYs0gYfY8uc8YeqSFvznpv_3sXKxkIMPK6dQ6NmZsHPn6HLlVTk1MaiQsor6umtWnU6VoU2G8AHma-lfJ8yl2HNduQCuYmDQGdBC6Q9uitze_n27phVFe8WR0vz7L42Y8qB5iHRFsuxLMCq_sDp_K97z3mbK08V3RYnZNWOwHCG4-uQdID7_WLpI109DWLXTiUI2hShQ"/>
<div class="absolute inset-0 map-gradient-overlay pointer-events-none"></div>
<!-- Custom Pin -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-full flex flex-col items-center">
<div class="bg-primary-container text-on-primary-container px-4 py-2 rounded-full font-label-bold text-label-bold mb-2 shadow-lg animate-bounce">
                    طلباتك ستصل هنا
                </div>
<div class="relative flex items-center justify-center">
<div class="ripple-effect w-12 h-12"></div>
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
</div>
<!-- Floating UI Elements -->
<div class="absolute top-6 left-6 right-6 flex flex-col gap-3">
<!-- Search Bar -->
<div class="bg-surface-container-lowest rounded-xl shadow-lg p-1 flex items-center gap-2 border border-outline/10">
<div class="p-3">
<span class="material-symbols-outlined text-tertiary">search</span>
</div>
<input class="bg-transparent border-none focus:ring-0 flex-grow text-body-lg font-body-lg py-3" placeholder="ابحث عن منطقتك، الشارع، أو المعلم..." type="text"/>
</div>
<!-- Current Location Button -->
<button class="self-start bg-on-background text-background flex items-center gap-2 px-6 py-3 rounded-full shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">my_location</span>
<span class="font-label-bold text-label-bold">استخدم موقعك الحالي</span>
</button>
</div>
<!-- Zoom Controls -->
<div class="absolute left-6 top-1/2 -translate-y-1/2 flex flex-col gap-2">
<button class="w-12 h-12 bg-surface-container-lowest rounded-lg shadow-md flex items-center justify-center hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
<button class="w-12 h-12 bg-surface-container-lowest rounded-lg shadow-md flex items-center justify-center hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
</main>
<!-- Bottom Confirmation Sheet -->
<div class="bg-surface-container-lowest floating-sheet z-50 rounded-t-[32px] p-6 pb-8 transition-transform duration-500 transform translate-y-0">
<div class="w-12 h-1.5 bg-surface-container-high rounded-full mx-auto mb-6"></div>
<div class="flex items-start gap-4 mb-8">
<div class="w-14 h-14 bg-primary-container/10 rounded-2xl flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="flex-grow">
<div class="flex items-center justify-between">
<span class="text-secondary font-label-bold text-label-bold">الموقع الحالي</span>
<button class="text-primary font-label-bold text-label-bold">تعديل</button>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mt-1">حي الملك فهد، الرياض</h3>
<p class="text-tertiary font-body-sm text-body-sm mt-0.5">شارع العليا، بناء 3172، الطابق 4، شقة 12</p>
</div>
</div>
<div class="grid grid-cols-2 gap-4 mb-8">
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-2xl border-2 border-primary bg-primary-container/5 transition-all">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-bold text-label-bold text-primary">المنزل</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-2xl border border-outline-variant hover:bg-surface-container transition-all">
<span class="material-symbols-outlined text-tertiary">work</span>
<span class="font-label-bold text-label-bold text-tertiary">العمل</span>
</button>
</div>
<button class="w-full bg-primary-container text-on-primary-container h-16 rounded-2xl font-headline-md text-headline-md shadow-[0_8px_30px_rgba(255,77,141,0.3)] active:scale-[0.98] transition-all hover:opacity-90">
            تأكيد الموقع والاشتراك
        </button>
</div>
<script>
        // Simple interactive simulation
        document.addEventListener('DOMContentLoaded', () => {
            const addressCard = document.querySelector('.floating-sheet');
            
            // Add a slight "float in" animation
            addressCard.style.transform = 'translateY(100%)';
            setTimeout(() => {
                addressCard.style.transform = 'translateY(0)';
            }, 300);

            // Interaction for location chips
            const buttons = document.querySelectorAll('.grid button');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => {
                        b.classList.remove('border-primary', 'bg-primary-container/5');
                        b.classList.add('border-outline-variant');
                        b.querySelector('span:first-child').classList.remove('text-primary');
                        b.querySelector('span:first-child').style.fontVariationSettings = "'FILL' 0";
                        b.querySelector('span:last-child').classList.remove('text-primary');
                        b.querySelector('span:last-child').classList.add('text-tertiary');
                    });
                    btn.classList.add('border-primary', 'bg-primary-container/5');
                    btn.classList.remove('border-outline-variant');
                    btn.querySelector('span:first-child').classList.add('text-primary');
                    btn.querySelector('span:first-child').style.fontVariationSettings = "'FILL' 1";
                    btn.querySelector('span:last-child').classList.remove('text-tertiary');
                    btn.querySelector('span:last-child').classList.add('text-primary');
                });
            });
        });
    </script>
</body></html>
