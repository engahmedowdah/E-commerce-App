<script>
        // Simple interaction for payment selection
        const paymentOptions = document.querySelectorAll('input[name="payment"]');
        paymentOptions.forEach(option => {
            option.addEventListener('change', (e) => {
                // Reset all borders
                paymentOptions.forEach(opt => {
                    opt.closest('label').classList.remove('border-primary-container');
                    opt.closest('label').classList.add('border-transparent');
                    opt.closest('label').classList.replace('bg-surface-container-lowest', 'bg-surface-container-low');
                });
                // Highlight selected
                if (e.target.checked) {
                    e.target.closest('label').classList.remove('border-transparent');
                    e.target.closest('label').classList.add('border-primary-container');
                    e.target.closest('label').classList.replace('bg-surface-container-low', 'bg-surface-container-lowest');
                }
            });
        });

        // Sticky header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('shadow-md');
            } else {
                header.classList.remove('shadow-md');
            }
        });
    </script>
