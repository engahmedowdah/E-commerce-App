<script>
        // Simple micro-interaction for the password visibility toggle
        document.querySelector('button[type="button"] .material-symbols-outlined').parentElement.addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        });

        // Add a subtle parallax effect to the hero image on mouse move
        const card = document.querySelector('.login-card-gradient');
        const img = card.querySelector('img');
        
        card.addEventListener('mousemove', (e) => {
            const { left, top, width, height } = card.getBoundingClientRect();
            const x = (e.clientX - left) / width - 0.5;
            const y = (e.clientY - top) / height - 0.5;
            
            img.style.transform = `rotate(2deg) translate(${x * 20}px, ${y * 20}px)`;
        });

        card.addEventListener('mouseleave', () => {
            img.style.transform = `rotate(2deg) translate(0, 0)`;
        });
    </script>
